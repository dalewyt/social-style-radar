services:
  - type: web
    name: social-style-radar
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "web:create_app()" --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: APIFY_API_KEY
        sync: false
      - key: BRAVE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
